# Test-profile overrides — LAYERED on top of the main application.properties via
# @ActiveProfiles("test") on the @SpringBootTest classes. Deliberately NOT named
# application.properties: a same-named file in test resources would SHADOW the main one
# entirely (Spring loads only the first application.properties on the classpath), silently
# reverting every main-config property (virtual threads, ai.koog key mapping, app.agent TTLs)
# to code defaults under test. A profile-specific file overrides only what it declares.
#
# Observability is disabled so integration tests never attempt an OTLP export (no LGTM stack
# runs under Testcontainers) — the agent installs no OpenTelemetry feature, proving
# observability is additive and never required (AC-19c).
app.observability.enabled=false
