spring.application.name=koog-spring-boot

# Virtual threads (Boot 3.5.x on Java 21+): cheap blocking I/O for JDBC calls.
spring.threads.virtual.enabled=true

# PostgreSQL is provisioned locally by Spring Boot Docker Compose support (compose.yaml).
# The datasource URL/credentials are auto-derived from the 'postgres' compose service.
# Docker Compose is automatically skipped during tests (Testcontainers is used instead).

# Flyway owns the schema; Hibernate/JPA is not used (Spring Data JDBC only).
spring.flyway.enabled=true

# springdoc / Swagger UI.
springdoc.swagger-ui.path=/swagger-ui.html

# Koog LLM providers (step 2). The starter auto-configures a client + executor per provider
# when its api-key is non-blank (enabled defaults to true). Keys come from env vars, never
# committed; a blank key simply disables that provider's auto-configuration.
ai.koog.anthropic.api-key=${ANTHROPIC_API_KEY:}
ai.koog.openai.api-key=${OPENAI_API_KEY:}

# Agent model selection, by Koog model id (resolved via LLModelDefinitions.modelsById()).
# Defaults track feature.md's intent: Anthropic Sonnet as the everyday model, Opus for
# complex turns (wired now, first used by step 4's strategy), OpenAI gpt-5.4 as the
# cross-provider error-fallback (see AgentService).
app.agent.anthropic-model=claude-sonnet-4-6
app.agent.anthropic-complex-model=claude-opus-4-7
app.agent.openai-fallback-model=gpt-5.4

# Agent conversation persistence (step 5). Durable state — Koog's chat_history / agent_checkpoints
# and our pending_interaction — lives this long before it is eligible for eviction; the sweep
# (ConversationCleanup) evicts abandoned pending interactions on this interval.
app.agent.conversation-ttl-seconds=86400
app.agent.cleanup-interval-ms=3600000

# Observability (step 6). Agent spans → OTLP → grafana/otel-lgtm (started by Spring Boot Docker
# Compose on bootRun), viewable in Grafana → Tempo at http://localhost:3000. Enabled for local dev;
# the tests set app.observability.enabled=false so they never try to export.
app.observability.enabled=true
app.observability.otlp-endpoint=http://localhost:4317
app.observability.service-name=money-transfer-agent
