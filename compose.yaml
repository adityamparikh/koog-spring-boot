services:
  postgres:
    image: 'postgres:17'
    environment:
      POSTGRES_DB: moneytransfer
      POSTGRES_USER: moneytransfer
      POSTGRES_PASSWORD: moneytransfer
    ports:
      - '5432:5432'

  # Observability (step 6): Grafana's all-in-one LGTM stack — Loki, Grafana, Tempo, Mimir — plus a
  # built-in OpenTelemetry Collector. Spring Boot Docker Compose brings it up on `bootRun`; the app
  # exports agent spans over OTLP to :4317, viewable as traces in Grafana → Tempo at http://localhost:3000.
  # Pinned tag (never `latest`) for reproducibility; bump deliberately.
  otel-lgtm:
    image: 'grafana/otel-lgtm:0.11.4'
    ports:
      - '3000:3000'   # Grafana UI
      - '4317:4317'   # OTLP gRPC
      - '4318:4318'   # OTLP HTTP
    # Spring Boot Docker Compose waits for health, not just start. Without this, the stack
    # accepts OTLP only ~10s after start and the first request's spans are silently dropped
    # (the gRPC exporter fails quietly). Grafana's /api/health flips once the stack is up;
    # curl ships in the image.
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:3000/api/health' ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
